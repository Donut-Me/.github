<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#f5a623;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="donutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560" />
      <stop offset="100%" style="stop-color:#f5a623" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5" fill="none">
    <line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="800" y1="0" x2="800" y2="300" />
    <line x1="1000" y1="0" x2="1000" y2="300" />
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="60" r="120" fill="url(#glow)" opacity="0.4" />
  <circle cx="150" cy="250" r="80" fill="url(#glow)" opacity="0.25" />

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1" />

  <!-- Donut icon (ring shape) -->
  <circle cx="380" cy="105" r="32" fill="none" stroke="url(#donutGrad)" stroke-width="14" opacity="0.9" />
  <circle cx="380" cy="105" r="10" fill="url(#bg)" />

  <!-- Title -->
  <text x="430" y="118" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Donut Me</text>

  <!-- Tagline -->
  <text x="345" y="170" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#a0aec0" letter-spacing="0.5">Crypto Payment Infrastructure for the Next Web</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">
    <rect x="345" y="195" width="110" height="30" rx="15" fill="#ffffff" opacity="0.08" />
    <text x="400" y="214" fill="#e94560" text-anchor="middle">Multi-chain</text>

    <rect x="467" y="195" width="85" height="30" rx="15" fill="#ffffff" opacity="0.08" />
    <text x="509" y="214" fill="#f5a623" text-anchor="middle">ERC-20</text>

    <rect x="564" y="195" width="105" height="30" rx="15" fill="#ffffff" opacity="0.08" />
    <text x="616" y="214" fill="#3178c6" text-anchor="middle">TypeScript</text>

    <rect x="681" y="195" width="115" height="30" rx="15" fill="#ffffff" opacity="0.08" />
    <text x="738" y="214" fill="#48bb78" text-anchor="middle">Open Source</text>
  </g>

  <!-- Chain names -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4a5568" letter-spacing="2">
    <text x="345" y="258">ETH · POLYGON · ARBITRUM · BASE · BSC</text>
  </g>

  <!-- Accent line bottom -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" rx="1" />
</svg>
